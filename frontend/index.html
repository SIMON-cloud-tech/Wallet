<!doctype html>
<html lang="en">
  <head>
    <!-- Character Encoding -->
    <meta charset="UTF-8" />
    
    <!-- Viewport & Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    
    <!-- SEO Meta Tags -->
    <title>Simoncees FinTech - Financial Management & M-Pesa Integration Solutions</title>

    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    <meta name="theme-color" content="#1f2937" />
    
    <!-- Canonical URL -->

    <!-- Icons & Favicon -->
    <link rel="icon" type="image/svg+xml" href="/output.svg" />
    <link rel="apple-touch-icon" href="/output.svg" />

    <meta name="twitter:title" content="Simoncees FinTech - Financial Management & Payment Solutions" />

    <meta name="format-detection" content="telephone=no" />
